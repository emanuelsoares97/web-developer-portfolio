<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components/buttons.css">
    <link rel="stylesheet" href="css/pages/contacts.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

  <header>
    <!-- Menu-->
    <nav class="navbar">
        <div class="home-login-icons">
            <a href="index.html"><img src="image/index/logocc.png" alt="" class="iconmenu"></a>
        </div>
            <ul class="menu">
          <li><a href="index.html" data-i18n="nav-home">Home</a></li>
          <li><a href="about.html" data-i18n="nav-about">About</a></li>
          <li><a href="projects.html" data-i18n="nav-projects">Projects</a></li>
          <li><a href="contacts.html" data-i18n="nav-contact">Contact</a></li>
        </ul>
        <div class="navbar-right">
                <button class="lang-toggle" onclick="toggleLang()" aria-label="Toggle language">
                    <span data-lang-opt="pt">PT</span>
                    <span class="lang-divider">|</span>
                    <span data-lang-opt="en">EN</span>
                </button>
                <div class="menu-icon">
                    <i class="material-icons">menu</i>
                </div>
            </div>
    </nav>
  </header>

    <main>
      <section class="contact">
        <h2 data-i18n="contact-title">Contact Me</h2>
        <p data-i18n="contact-subtitle">If you'd like to get in touch, feel free to send me a message!</p>
    
        <div class="contact-info">
            <form id="contact-form">
              <input type="text" id="name" name="name" placeholder="Your name" data-i18n-placeholder="name" required>
              <input type="email" id="email" name="email" placeholder="Your email" data-i18n-placeholder="email" required>
              <textarea id="message" name="message" placeholder="Your message" data-i18n-placeholder="message" required></textarea>
              <button type="submit" data-i18n="contact-btn-send">Send</button>
            </form>
            <div id="status"></div>
    
            <div class="social-links">
                <p data-i18n="contact-or">Or connect with me on:</p>
                <a href="https://www.linkedin.com/in/seu-linkedin" target="_blank">LinkedIn</a>
                <a href="https://github.com/seu-github" target="_blank">GitHub</a>
                <a href="https://www.instagram.com/seu-instagram" target="_blank">Instagram</a>
            </div>
        </div>
    </section>
    
    </main>
  <script src="script/form.js"></script>
  <script src="script/menu.js"></script>
  <script src="script/lang.js"></script>
</body>
</html>
